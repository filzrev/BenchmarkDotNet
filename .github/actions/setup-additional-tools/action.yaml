name: Setup Additional Tools
description: |
  Setup additional tools that required for Wasm/NativeAOT tests
  - Node.js
  - V8 with jsvu
  - .NET wasm-tools workload

runs:
  using: composite
  steps:
    - name: Set up node
      uses: actions/setup-node@v6
      with:
        node-version: "26"

    - name: Set up v8
      shell: bash
      run: |
        npm install jsvu -g
        jsvu --os=default --engines=v8


        # Verify d8 command available
        v8 --version

