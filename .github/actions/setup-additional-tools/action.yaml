name: Setup Additional Tools
description: |
  Setup additional tools that required for Wasm/NativeAOT tests
  - Node.js
  - V8 with jsvu
  - .NET wasm-tools workload
env:
  NODE_DEBUG: "*"
  npm_config_loglevel: silly
  ACTIONS_STEP_DEBUG: true
runs:
  using: composite
  steps:
    - name: Set up node
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Set up v8
      shell: bash
      run: |
        npx jsvu --os=default --engines=v8-debug

    - name: Verify
      shell: pwsh
      run: |
        Get-ChildItem "$HOME/.jsvu" -Recurse

        Get-Command v8
