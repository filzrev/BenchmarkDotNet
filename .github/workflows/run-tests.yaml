name: run-tests
run-name: Run tests / ${{ github.event.head_commit.message }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
  workflow_dispatch:

env:
  IS_DRAFT_PR: ${{ github.event.pull_request.draft }}
  LC_ALL: C
  LANG: C
  LANGUAGE: C

jobs:

  test-linux:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - run : |
          {
            echo '## lscpu'
            echo
            echo '```txt'
            cat /proc/cpuinfo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo '## lscpu'
            echo
            echo '```txt'
            lscpu
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
