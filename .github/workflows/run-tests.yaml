name: run-tests
run-name: Run tests / ${{ github.event.head_commit.message }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
  workflow_dispatch:

env:
  IS_DRAFT_PR: ${{ github.event.pull_request.draft }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  test-linux:
    strategy:
      matrix:
        os: [ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # Build and Test
      - name: Run task 'build'
        run: ./build.cmd build
      - name: Run task 'in-tests-core'
        run: ./build.cmd in-tests-core -e
      - name: Test
        shell: pwsh
        if: always()
        env:
          NO_COLOR: true
        run: Get-ChildItem /home/runner/work/BenchmarkDotNet/BenchmarkDotNet/tests/BenchmarkDotNet.IntegrationTests/bin/Release/net8.0/**/*AutoGenerated*.deps.json | Get-Content -Raw
      # Report test results with unique name
      - name: Report tests results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: test-linux-${{ matrix.os }}
          path: "**/*.trx"
          reporter: dotnet-trx
      # Upload Artifacts with Unique Name
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-linux-trx-${{ github.run_id }}-${{ matrix.os }}
          path: "**/*.trx"

  test-macos:
    name: test-macos (${{ matrix.os.arch }})
    runs-on: ${{ matrix.os.runs-on }}
    strategy:
      matrix:
        os:
          - runs-on: 'macos-latest'
            arch: 'arm64'
          - runs-on: 'macos-26-intel'
            arch: 'x64'
    steps:
      - uses: actions/checkout@v6
      # Build and Test
      - name: Run task 'build'
        run: ./build.cmd build
      - name: Run task 'in-tests-core'
        run: ./build.cmd in-tests-core -e
      - name: Test
        shell: pwsh
        if: always()
        run: Get-ChildItem /home/runner/work/BenchmarkDotNet/BenchmarkDotNet/tests/BenchmarkDotNet.IntegrationTests/bin/Release/net8.0/**/*AutoGenerated*.deps.json | Get-Content -Raw
      # Report test results with unique name
      - name: Report tests results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: test-macos(${{ matrix.os.arch }})
          path: "**/*.trx"
          reporter: dotnet-trx
      # Upload Artifacts with Unique Name
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-macos(${{ matrix.os.arch }})-trx-${{ github.run_id }}
          path: "**/*.trx"

  test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run task 'pack'
        run: ./build.cmd pack

  spellcheck-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        name: Setup node
        with:
          node-version: "24"
      - name: Install cSpell
        run: npm install -g cspell@9.7.0
      - name: Copy cSpell config
        run: cp ./build/cSpell.json ./cSpell.json
      - name: Run cSpell
        run: cspell --config ./cSpell.json "docs/**/*.md" --no-progress
