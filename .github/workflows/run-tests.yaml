name: run-tests
run-name: Run tests / ${{ github.event.head_commit.message }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
  workflow_dispatch:

env:
  IS_DRAFT_PR: ${{ github.event.pull_request.draft }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  test-linux:
    strategy:
      matrix:
        os: [ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # Build and Test
      - name: Run task 'build'
        run: ./build.cmd build
      - name: Run task 'in-tests-core'
        run: ./build.cmd in-tests-core -e
      - name: Test
        shell: pwsh
        if: always()
        env:
          NO_COLOR: true
        run: Get-ChildItem /home/runner/work/BenchmarkDotNet/BenchmarkDotNet/tests/BenchmarkDotNet.IntegrationTests/bin/Release/net8.0/**/*AutoGenerated*.deps.json | Get-Content -Raw
      # Upload Artifacts with Unique Name
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-linux-trx-${{ github.run_id }}-${{ matrix.os }}
          path: |
            **/*.trx
            **/*.deps.json

  test-macos:
    name: test-macos (${{ matrix.os.arch }})
    runs-on: ${{ matrix.os.runs-on }}
    strategy:
      matrix:
        os:
          - runs-on: 'macos-latest'
            arch: 'arm64'
          - runs-on: 'macos-26-intel'
            arch: 'x64'
    steps:
      - uses: actions/checkout@v6
      # Build and Test
      - name: Run task 'build'
        run: ./build.cmd build
      - name: Run task 'in-tests-core'
        run: ./build.cmd in-tests-core -e
      - name: Test
        shell: pwsh
        if: always()
        run: Get-ChildItem /home/runner/work/BenchmarkDotNet/BenchmarkDotNet/tests/BenchmarkDotNet.IntegrationTests/bin/Release/net8.0/**/*AutoGenerated*.deps.json | Get-Content -Raw
      # Upload Artifacts with Unique Name
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-macos(${{ matrix.os.arch }})-trx-${{ github.run_id }}
          path: |
            **/*.trx
            **/*.deps.json

