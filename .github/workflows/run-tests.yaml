name: run-tests
run-name: Run tests / ${{ github.event.head_commit.message }}

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  test-windows-core:
    strategy:
      matrix:
        os: [windows-latest, windows-11-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - shell: pwsh
        run: |
          wmic.exe /?
          systeminfo
          $win32_Processor = Get-CimInstance -ClassName Win32_Processor
          Write-Host $win32_Processor.CurrentClockSpeed
          Write-Host $win32_Processor.MaxClockSpeed
